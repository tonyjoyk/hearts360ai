# Publishes ./dist to branch `gh-pages`.
#
# After the workflow succeeds once:
#   Repo → Settings → Pages → Build and deployment → Deploy from a branch
#   → Branch: gh-pages, Folder: / (root) → Save
#
# Open: https://<owner>.github.io/<repo>/#/  (dashboard + "View district report" side panel)
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Allow pushing the gh-pages branch (org default token must allow "Read and write" for workflows:
# Settings → Actions → General → Workflow permissions → Read and write permissions)
permissions:
  contents: write

concurrency:
  group: gh-pages-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      # GITHUB_ACTIONS + GITHUB_REPOSITORY are set by GitHub → base path /${{ repo }}/
      - name: Build static site
        run: npm run build

      - name: SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
